name: npm publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - CHANGELOG.md
      - pnpm-lock.yaml
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test:coverage
          pnpm build
          pnpm docs:build

      - name: Resolve release version
        id: version
        run: |
          set -eu
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Stop if tag already exists
        id: existing-tag
        run: |
          set -eu
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check published npm version
        if: steps.existing-tag.outputs.exists == 'false'
        id: published-package
        run: |
          set -eu
          if npm view "@querry-kit/nuxt-ui@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "Package @querry-kit/nuxt-ui@${{ steps.version.outputs.version }} is already published."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.existing-tag.outputs.exists == 'false' && steps.published-package.outputs.exists == 'false'
        run: npm publish --access public --provenance

      - name: Create release commit
        if: steps.existing-tag.outputs.exists == 'false'
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git commit -m "Release ${{ steps.version.outputs.tag }}"

      - name: Create and push tag
        if: steps.existing-tag.outputs.exists == 'false'
        run: |
          set -eu
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.existing-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Install with: pnpm add @querry-kit/nuxt-ui"

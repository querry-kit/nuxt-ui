name: npm publish

on:
  push:
    branches: [main]
    paths: [package.json, pnpm-lock.yaml, CHANGELOG.md]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint && pnpm typecheck && pnpm test:coverage && pnpm build && pnpm docs:build && pnpm build:storybook
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm screenshots:capture && pnpm screenshots:verify
      - run: npm publish --access public
